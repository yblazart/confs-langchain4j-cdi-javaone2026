# LangChain4j-CDI  Demo 2: Fault Tolerance + Telemetry + Memory + Tools
# Mistral AI configuration

# Model Configuration
dev.langchain4j.cdi.plugin.my-model.class=dev.langchain4j.model.mistralai.MistralAiChatModel
dev.langchain4j.cdi.plugin.my-model.config.api-key=${MISTRAL_API_KEY}
dev.langchain4j.cdi.plugin.my-model.config.model-name=mistral-small-latest
dev.langchain4j.cdi.plugin.my-model.config.log-requests=true
dev.langchain4j.cdi.plugin.my-model.config.log-responses=true

# Memory: provided by the CDI bean ChatMemoryProviderBean (@Named("my-memory"))
# Fault Tolerance: configured via annotations on ChatAssistant

# =============================================================================
# OpenTelemetry Configuration
# =============================================================================

# MicroProfile OpenTelemetry - OTLP Exporter Configuration
# Connect to local OpenTelemetry collector (gRPC endpoint)
otel.exporter.otlp.endpoint=http://localhost:4318
otel.exporter.otlp.protocol=http/protobuf
otel.service.name=demo-2-langchain4j-cdi
otel.sdk.disabled=false
otel.traces.exporter=otlp
otel.metrics.exporter=otlp
otel.logs.exporter=otlp

# LangChain4j-CDI Telemetry - OpenTelemetry Listeners
# Enable comprehensive AI observability
dev.langchain4j.cdi.plugin.my-model.config.listeners=\
    dev.langchain4j.cdi.telemetry.SpanChatModelListener,\
    dev.langchain4j.cdi.telemetry.MetricsChatModelListener

# Optional: Configure resource attributes for better observability
otel.resource.attributes=\
    service.name=demo-2-langchain4j-cdi,\
    service.version=1.0-SNAPSHOT,\
    deployment.environment=demo
