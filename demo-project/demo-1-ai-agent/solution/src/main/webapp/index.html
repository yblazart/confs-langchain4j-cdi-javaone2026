<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 1 — Dwarven Tavern AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            background: #0d1117; color: #c9d1d9;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header {
            background: #161b22; border-bottom: 1px solid #30363d;
            padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;
            flex-shrink: 0;
        }
        header h1 { font-size: 1.2rem; color: #58a6ff; }
        header .badge {
            background: #238636; color: #fff; font-size: 0.7rem;
            padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 600;
        }
        header .subtitle { color: #8b949e; font-size: 0.8rem; margin-left: auto; }
        #chat {
            flex: 1; overflow-y: auto; padding: 1.5rem 2rem;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .msg { max-width: 75%; padding: 0.8rem 1rem; border-radius: 8px; line-height: 1.5; }
        .msg.user {
            align-self: flex-end; background: #1f6feb; color: #fff;
        }
        .msg.bot {
            align-self: flex-start; background: #21262d; border: 1px solid #30363d;
        }
        .msg.bot pre { white-space: pre-wrap; font-family: inherit; }
        .msg.error { align-self: center; background: #da3633; color: #fff; font-size: 0.85rem; }
        #input-bar {
            background: #161b22; border-top: 1px solid #30363d;
            padding: 1rem 2rem; display: flex; gap: 0.8rem;
            flex-shrink: 0;
        }
        #message {
            flex: 1; background: #0d1117; border: 1px solid #30363d;
            color: #c9d1d9; padding: 0.7rem 1rem; border-radius: 6px;
            font-family: inherit; font-size: 0.95rem; outline: none;
        }
        #message:focus { border-color: #58a6ff; }
        #message::placeholder { color: #484f58; }
        button {
            background: #238636; color: #fff; border: none;
            padding: 0.7rem 1.5rem; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-weight: 600; font-size: 0.95rem;
        }
        button:hover { background: #2ea043; }
        .loading { pointer-events: none; }
        .spinner { display: none; }
        .loading .spinner { display: inline-flex; gap: 3px; align-items: center; }
        .loading .label { display: none; }
        .dot {
            width: 6px; height: 6px; background: #fff; border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .welcome {
            text-align: center; color: #8b949e; margin: auto;
            font-size: 0.9rem; line-height: 1.8;
        }
        .welcome code {
            background: #21262d; padding: 0.15rem 0.4rem; border-radius: 4px;
            color: #f0883e; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🧔 Demo 1 — Dwarven Tavern Comedian</h1>
        <span class="badge">SOLUTION</span>
        <span class="subtitle">@RegisterAIService + CDI @Inject</span>
        <a href="stream.html" style="margin-left: auto; color: #58a6ff; text-decoration: none; font-size: 0.85rem; padding: 0.4rem 0.8rem; border: 1px solid #30363d; border-radius: 6px;">🌊 Streaming SSE</a>
        <a href="image.html" style="color: #58a6ff; text-decoration: none; font-size: 0.85rem; padding: 0.4rem 0.8rem; border: 1px solid #30363d; border-radius: 6px;">🖼️ Image Analysis</a>
    </header>

    <div id="chat">
        <div class="welcome">
            <p>💉 <code>@Inject ChatAssistant</code> — powered by LangChain4j-CDI</p>
            <p>Model: <code>ministral-3:3b</code> via Ollama</p>
            <p>🍺 Welcome to the tavern! Ask for a dwarf joke 🧔</p>
        </div>
    </div>

    <div id="input-bar">
        <input type="text" id="message" autocomplete="off"
               placeholder="Ask for a joke about beer, gold or elves…">
        <button id="send-btn" onclick="sendMessage()">
            <span class="label">Send</span>
            <span class="spinner"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
        </button>
    </div>

    <script>
        let welcomed = false;
        let sending = false;

        function appendMsg(text, cls) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            if (cls === 'bot') {
                const pre = document.createElement('pre');
                pre.textContent = text;
                div.appendChild(pre);
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        async function sendMessage() {
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (!msg || sending) return;

            if (!welcomed) {
                document.querySelector('.welcome')?.remove();
                welcomed = true;
            }

            appendMsg(msg, 'user');
            input.value = '';
            sending = true;
            document.getElementById('send-btn').classList.add('loading');

            try {
                const resp = await fetch('api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: msg
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const text = await resp.text();
                appendMsg(text, 'bot');
            } catch (e) {
                appendMsg('⚠ ' + e.message, 'error');
            } finally {
                sending = false;
                document.getElementById('send-btn').classList.remove('loading');
                input.focus();
            }
        }

        document.getElementById('message').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });
    </script>
</body>
</html>
