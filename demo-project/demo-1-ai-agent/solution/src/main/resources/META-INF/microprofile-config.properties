# ============================================
# LangChain4j-CDI Demo 1 : AI Agent (solution)
# ============================================
# Mistral AI model configuration

# Regular chat model
dev.langchain4j.cdi.plugin.my-model.class=dev.langchain4j.model.mistralai.MistralAiChatModel
dev.langchain4j.cdi.plugin.my-model.config.api-key=${MISTRAL_API_KEY}
dev.langchain4j.cdi.plugin.my-model.config.model-name=mistral-small-latest
dev.langchain4j.cdi.plugin.my-model.config.temperature=0.9
dev.langchain4j.cdi.plugin.my-model.config.log-requests=true
dev.langchain4j.cdi.plugin.my-model.config.log-responses=true

# Streaming chat model for SSE demo
dev.langchain4j.cdi.plugin.my-streaming-model.class=dev.langchain4j.model.mistralai.MistralAiStreamingChatModel
dev.langchain4j.cdi.plugin.my-streaming-model.config.api-key=${MISTRAL_API_KEY}
dev.langchain4j.cdi.plugin.my-streaming-model.config.model-name=mistral-small-latest
dev.langchain4j.cdi.plugin.my-streaming-model.config.temperature=0.9
dev.langchain4j.cdi.plugin.my-streaming-model.config.log-requests=true
dev.langchain4j.cdi.plugin.my-streaming-model.config.log-responses=true

# Vision model for image analysis
# IMPORTANT: This model MUST support image analysis (vision capabilities)
# Compatible models:
#   - Mistral AI: pixtral-large-latest, pixtral-12b-2409
#   - OpenAI: gpt-4o, gpt-4-turbo, gpt-4o-mini (all support vision)
#   - GROQ: meta-llama/llama-4-scout-17b-16e-instruct

# Option 1: Mistral AI (active by default, requires MISTRAL_API_KEY env var)
dev.langchain4j.cdi.plugin.vision-model.class=dev.langchain4j.model.mistralai.MistralAiChatModel
dev.langchain4j.cdi.plugin.vision-model.config.api-key=${MISTRAL_API_KEY}
dev.langchain4j.cdi.plugin.vision-model.config.model-name=pixtral-large-latest
dev.langchain4j.cdi.plugin.vision-model.config.temperature=0.3
dev.langchain4j.cdi.plugin.vision-model.config.max-tokens=1000

