# ============================================
# LangChain4j-CDI Demo 1 : AI Agent (solution)
# ============================================
# Complete Ollama model configuration

# Regular chat model
dev.langchain4j.cdi.plugin.my-model.class=dev.langchain4j.model.ollama.OllamaChatModel
dev.langchain4j.cdi.plugin.my-model.config.base-url=http://localhost:11434
dev.langchain4j.cdi.plugin.my-model.config.model-name=llama3.1:8b
dev.langchain4j.cdi.plugin.my-model.config.temperature=0.9
dev.langchain4j.cdi.plugin.my-model.config.log-requests=true
dev.langchain4j.cdi.plugin.my-model.config.log-responses=true

# Streaming chat model for SSE demo
dev.langchain4j.cdi.plugin.my-streaming-model.class=dev.langchain4j.model.ollama.OllamaStreamingChatModel
dev.langchain4j.cdi.plugin.my-streaming-model.config.base-url=http://localhost:11434
dev.langchain4j.cdi.plugin.my-streaming-model.config.model-name=llama3.1:8b
dev.langchain4j.cdi.plugin.my-streaming-model.config.temperature=0.9
dev.langchain4j.cdi.plugin.my-streaming-model.config.log-requests=true
dev.langchain4j.cdi.plugin.my-streaming-model.config.log-responses=true

# Vision model for image analysis
# IMPORTANT: This model MUST support image analysis (vision capabilities)
# Compatible models:
#   - Ollama: llama3.2-vision:11b, llama3.2-vision:90b, minicpm-v
#   - OpenAI: gpt-4o, gpt-4-turbo, gpt-4o-mini (all support vision)
#   - GROQ: meta-llama/llama-4-scout-17b-16e-instruct

# Option 1: Ollama (uncomment to use)
#dev.langchain4j.cdi.plugin.vision-model.class=dev.langchain4j.model.ollama.OllamaChatModel
#dev.langchain4j.cdi.plugin.vision-model.config.base-url=http://localhost:11434
#dev.langchain4j.cdi.plugin.vision-model.config.model-name=llama3.2-vision:11b
#dev.langchain4j.cdi.plugin.vision-model.config.temperature=0.1

# Option 2: OpenAI (uncomment to use, requires OPENAI_API_KEY env var)
# dev.langchain4j.cdi.plugin.vision-model.class=dev.langchain4j.model.openai.OpenAiChatModel
# dev.langchain4j.cdi.plugin.vision-model.config.api-key=${OPENAI_API_KEY}
# dev.langchain4j.cdi.plugin.vision-model.config.model-name=gpt-4o
# dev.langchain4j.cdi.plugin.vision-model.config.temperature=0.3
# dev.langchain4j.cdi.plugin.vision-model.config.max-tokens=1000

# Option 3: GROQ (active by default, requires GROQ_API_KEY env var)
dev.langchain4j.cdi.plugin.vision-model.class=dev.langchain4j.model.openai.OpenAiChatModel
dev.langchain4j.cdi.plugin.vision-model.config.api-key=${GROQ_API_KEY}
dev.langchain4j.cdi.plugin.vision-model.config.base-url=https://api.groq.com/openai/v1
dev.langchain4j.cdi.plugin.vision-model.config.model-name=meta-llama/llama-4-scout-17b-16e-instruct
dev.langchain4j.cdi.plugin.vision-model.config.temperature=0.3
dev.langchain4j.cdi.plugin.vision-model.config.max-tokens=1000
