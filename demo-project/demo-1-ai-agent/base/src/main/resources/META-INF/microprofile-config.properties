# dev.langchain4j.cdi.plugin.vision-model.config.model-name=llama3.2-vision:11b
# dev.langchain4j.cdi.plugin.vision-model.config.temperature=0.3

# Option 2 : With OpenAI (uncomment to enable + set OPENAI_API_KEY environment variable)
# dev.langchain4j.cdi.plugin.vision-model.class=dev.langchain4j.model.openai.OpenAiChatModel
